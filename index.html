<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ERP PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* CSS */

body{
font-family:Segoe UI;
background:#f3f4f6;
padding-bottom:80px;
}

.navbar{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
}

.navbtn{
flex:1;
color:#888;
padding:12px;
font-size:12px;
text-align:center;
}

.active{
color:white;
border-top:3px solid #3b82f6;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th,.table td{
border:1px solid black;
padding:6px;
font-size:12px;
}

</style>

</head>

<body>

<div class="max-w-4xl mx-auto p-4">

<h1 class="text-3xl font-bold text-center mb-4">
ERP PRO
</h1>

<!-- CUSTOMER -->

<div class="bg-white p-4 rounded shadow mb-4">

<input id="custName" placeholder="Customer Name"
class="border p-2 w-full mb-2">

<input id="custPhone" placeholder="WhatsApp Number"
class="border p-2 w-full">

</div>

<!-- ADD ITEM -->

<div class="bg-white p-4 rounded shadow mb-4">

<input id="itemName" placeholder="Item Name"
class="border p-2 w-full mb-2">

<div class="grid grid-cols-2 gap-2">

<input id="itemRate" placeholder="Rate"
class="border p-2">

<input id="itemQty" placeholder="Qty"
class="border p-2">

</div>

<button onclick="addItem()"
class="bg-blue-600 text-white w-full p-3 mt-3 rounded">

Add Item

</button>

</div>

<!-- BILL -->

<div id="invoicePage"
class="bg-white p-4 rounded shadow">

<table class="table">

<thead>

<tr>

<th>#</th>
<th>Item</th>
<th>Qty</th>
<th>Rate</th>
<th>Total</th>

</tr>

</thead>

<tbody id="billItems"></tbody>

</table>

<div class="text-right mt-4 font-bold text-lg">

Total ₹ <span id="grandTotal">0</span>

</div>

</div>

<!-- ACTION BUTTONS -->

<div class="grid grid-cols-2 gap-2 mt-4">

<button onclick="downloadPDF()"
class="bg-red-600 text-white p-3 rounded">

Download PDF

</button>

<button onclick="sendWA()"
class="bg-green-600 text-white p-3 rounded">

WhatsApp

</button>

</div>

</div>

<!-- NAVBAR -->

<div class="navbar">

<div class="navbtn active">Entry</div>
<div class="navbtn">Reports</div>
<div class="navbtn">Settings</div>

</div>

<script>

/* DATABASE */

let items=[];
let sales=JSON.parse(localStorage.getItem("sales"))||[];

/* ADD ITEM */

function addItem(){

const name=document.getElementById("itemName").value;
const rate=parseFloat(document.getElementById("itemRate").value);
const qty=parseFloat(document.getElementById("itemQty").value);

if(!name||!rate||!qty){
alert("Fill all fields");
return;
}

const total=rate*qty;

items.push({name,rate,qty,total});

renderItems();

}

/* RENDER TABLE */

function renderItems(){

let html="";
let grand=0;

items.forEach((it,i)=>{

html+=`

<tr>

<td>${i+1}</td>

<td>${it.name}</td>

<td>${it.qty}</td>

<td>${it.rate}</td>

<td>${it.total}</td>

</tr>

`;

grand+=it.total;

});

document.getElementById("billItems").innerHTML=html;

document.getElementById("grandTotal").innerText=grand;

}

/* PDF */

function downloadPDF(){

html2pdf()
.from(document.getElementById("invoicePage"))
.save("invoice.pdf");

}

/* SAVE SALE */

function saveSale(){

const total=document.getElementById("grandTotal").innerText;

const cust=document.getElementById("custName").value||"Cash";

sales.push({

customer:cust,
total:total,
date:new Date().toLocaleDateString()

});

localStorage.setItem("sales",JSON.stringify(sales));

}

/* WHATSAPP */

function sendWA(){

saveSale();

const phone=document.getElementById("custPhone").value;

const total=document.getElementById("grandTotal").innerText;

window.open(

`https://wa.me/91${phone}?text=Bill Amount ₹${total}`

);

}

</script>

</body>
</html>
