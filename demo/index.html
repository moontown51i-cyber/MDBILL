<!-- Is code ko use karne se "Built in" button nahi aayega -->
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional ERP Master v26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; z-index: 1000; box-shadow: 0 -5px 30px rgba(0,0,0,0.05); border-top: 1px solid #e2e8f0; }
        .nav-btn { flex: 1; color: #94a3b8; text-align: center; padding: 12px 5px; font-size: 10px; font-weight: 800; text-transform: uppercase; border: none; background: transparent; }
        .nav-btn.active { color: #2563eb; border-top: 3px solid #2563eb; }
        .bill-wrapper { width: 100%; display: flex; justify-content: center; overflow: hidden; padding: 10px 0; }
        #invoice-page { background: white; width: 210mm; min-height: 297mm; padding: 12mm; box-sizing: border-box; transform-origin: top center; box-shadow: 0 10px 50px rgba(0,0,0,0.1); }
        @media (max-width: 800px) { #invoice-page { transform: scale(0.40); margin-bottom: -580px; } }
        .table-bill { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table-bill th, .table-bill td { border: 1px solid #000; padding: 5px; font-size: 11px; text-align: center; }
        @media print { .no-print { display: none !important; } #invoice-page { transform: scale(1) !important; margin: 0 !important; border: none; } }
    </style>
</head>
<body>
    <!-- Yahan koi watermark button nahi hai -->
    <div id="main-app">
        <div class="bottom-nav no-print">
            <button onclick="tab('dash')" id="btn-dash" class="nav-btn active">📊<br>Dashboard</button>
            <button onclick="tab('entry')" id="btn-entry" class="nav-btn">📝<br>New Bill</button>
            <button onclick="tab('view')" id="btn-view" class="nav-btn">📄<br>View</button>
            <button onclick="tab('settings')" id="btn-settings" class="nav-btn">⚙️<br>Setup</button>
        </div>

        <div class="p-4 max-w-xl mx-auto space-y-4">
            <section id="sec-dash" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-indigo-600 text-white p-5 rounded-3xl shadow-lg">
                        <p class="text-[10px] uppercase font-bold">Total Sales</p>
                        <h2 id="total-sale" class="text-xl font-black">₹0.00</h2>
                    </div>
                    <div class="bg-rose-500 text-white p-5 rounded-3xl shadow-lg">
                        <p class="text-[10px] uppercase font-bold">Total Purchase</p>
                        <h2 id="total-pur" class="text-xl font-black">₹0.00</h2>
                    </div>
                </div>
                <div id="history-list" class="space-y-2"></div>
            </section>

            <section id="sec-entry" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border-b-8 border-indigo-600 space-y-3">
                    <select id="b_type" onchange="sync()" class="w-full bg-slate-50 p-4 rounded-2xl font-bold text-indigo-700">
                        <option value="SALE INVOICE">SALE INVOICE</option>
                        <option value="PURCHASE BILL">PURCHASE BILL</option>
                    </select>
                    <input id="c_name" type="text" placeholder="Customer Name" oninput="sync()" class="w-full bg-slate-50 p-4 rounded-2xl outline-none">
                    <input id="c_gst" type="text" placeholder="Grahak GSTIN" oninput="sync()" class="w-full bg-slate-50 p-4 rounded-2xl uppercase font-bold text-indigo-500">
                    <input id="c_addr" type="text" placeholder="Address" oninput="sync()" class="w-full bg-slate-50 p-4 rounded-2xl outline-none">
                    <input id="c_phone" type="number" placeholder="WhatsApp Number" class="w-full bg-slate-50 p-4 rounded-2xl">
                </div>
                <!-- ... Item entry same as before ... -->
                <button onclick="addItem()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black">+ Add Item</button>
                <div id="mini-list" class="hidden p-2 flex flex-wrap gap-2"></div>
                <button onclick="tab('view')" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold uppercase tracking-widest">👁️ View Bill</button>
            </section>

            <section id="sec-view" class="hidden">
                <!-- Invoice logic same as before -->
                <div class="no-print flex justify-center gap-2 mb-4">
                    <button onclick="downloadPDF()" class="bg-rose-600 text-white px-8 py-3 rounded-full font-bold text-xs uppercase">Download PDF</button>
                    <button onclick="saveFinal()" class="bg-indigo-900 text-white px-8 py-3 rounded-full font-bold text-xs uppercase">Save Record</button>
                </div>
                <div class="bill-wrapper"><div id="invoice-page">
                    <!-- Invoice content will go here -->
                </div></div>
            </section>
        </div>
    </div>

    <script>
        // Use the JavaScript logic from v26.0 here
    </script>
</body>
</html>
