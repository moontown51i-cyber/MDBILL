<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MDBILL ULTIMATE ERP</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f1f5f9;
}

@media print{

.sidebar,
.bottomnav,
.noprint{
display:none;
}

}

</style>

</head>

<body>

<div class="flex h-screen">

<!-- SIDEBAR -->

<div class="sidebar hidden md:block w-64 bg-indigo-900 text-white p-4">

<h1 onclick="openPage('settings')" id="shopTitle"
class="text-xl font-bold cursor-pointer">
MDBILL
</h1>

<ul class="mt-6 space-y-4">

<li onclick="openPage('dashboard')">Dashboard</li>
<li onclick="openPage('billing')">Billing</li>
<li onclick="openPage('inventory')">Inventory</li>
<li onclick="openPage('customers')">Customers</li>
<li onclick="openPage('history')">Invoices</li>
<li onclick="openPage('settings')">Settings</li>

</ul>

</div>


<div class="flex-1 p-4 overflow-auto">

<!-- DASHBOARD -->

<div id="dashboard">

<h2 class="text-2xl font-bold mb-4">Dashboard</h2>

<canvas id="salesChart"></canvas>

</div>


<!-- BILLING -->

<div id="billing" class="hidden">

<h2 class="text-xl font-bold mb-4">Create Invoice</h2>

<div class="bg-white p-4 rounded shadow">

<div class="grid md:grid-cols-3 gap-2">

<select id="billType" class="border p-2">

<option>Sale</option>
<option>Purchase</option>
<option>Quotation</option>

</select>

<input id="invoiceNo" class="border p-2">

<input id="customerName" placeholder="Customer Name" class="border p-2">

<input id="mobile" placeholder="Mobile" class="border p-2">

<input id="address" placeholder="Address" class="border p-2">

<input id="gstin" placeholder="GSTIN" class="border p-2">

</div>

<table class="w-full mt-4 border">

<thead class="bg-gray-200">

<tr>
<th>Item</th>
<th>Qty</th>
<th>Rate</th>
<th>GST%</th>
<th>Total</th>
</tr>

</thead>

<tbody id="items">

<tr>

<td><input class="item border w-full"></td>
<td><input type="number" class="qty border w-full"></td>
<td><input type="number" class="rate border w-full"></td>
<td><input type="number" class="gst border w-full"></td>
<td class="total">0</td>

</tr>

</tbody>

</table>

<button onclick="addRow()" class="bg-blue-500 text-white px-3 py-1 mt-2">
Add Item
</button>

<h3 class="mt-4 text-lg">
Grand Total ₹ <span id="grandTotal">0</span>
</h3>

<div class="mt-4 space-x-2 noprint">

<button onclick="saveBill()" class="bg-green-600 text-white px-4 py-2">
Save
</button>

<button onclick="shareWhatsApp()" class="bg-green-500 text-white px-4 py-2">
WhatsApp
</button>

<button onclick="window.print()" class="bg-gray-700 text-white px-4 py-2">
Print
</button>

</div>

</div>

</div>


<!-- INVENTORY -->

<div id="inventory" class="hidden">

<h2 class="text-xl font-bold mb-4">Inventory</h2>

<input id="itemName" placeholder="Item Name" class="border p-2">
<input id="itemPrice" placeholder="Price" class="border p-2">

<button onclick="addStock()" class="bg-blue-600 text-white px-3 py-2">
Add
</button>

<table class="w-full mt-4 border">

<thead class="bg-gray-200">

<tr>
<th>Item</th>
<th>Price</th>
</tr>

</thead>

<tbody id="stockTable"></tbody>

</table>

</div>


<!-- CUSTOMERS -->

<div id="customers" class="hidden">

<h2 class="text-xl font-bold mb-4">Customers</h2>

<table class="w-full border">

<thead class="bg-gray-200">

<tr>
<th>Name</th>
<th>Mobile</th>
</tr>

</thead>

<tbody id="customerTable"></tbody>

</table>

</div>


<!-- INVOICE HISTORY -->

<div id="history" class="hidden">

<h2 class="text-xl font-bold mb-4">Invoices</h2>

<table class="w-full border">

<thead class="bg-gray-200">

<tr>
<th>Invoice</th>
<th>Customer</th>
<th>Total</th>
</tr>

</thead>

<tbody id="invoiceTable"></tbody>

</table>

</div>


<!-- SETTINGS -->

<div id="settings" class="hidden">

<h2 class="text-xl font-bold mb-4">Business Settings</h2>

<input id="shopName" placeholder="Shop Name" class="border p-2 w-full">
<input id="shopPhone" placeholder="Phone" class="border p-2 w-full">
<input id="shopAddress" placeholder="Address" class="border p-2 w-full">

<button onclick="saveProfile()" class="bg-blue-600 text-white px-4 py-2">
Save
</button>

<br><br>

<button onclick="backupData()" class="bg-green-600 text-white px-4 py-2">
Backup Data
</button>

<input type="file" onchange="restoreData(event)" class="border p-2">

</div>

</div>

</div>

<div class="bottomnav md:hidden fixed bottom-0 w-full bg-white border flex justify-around p-2">

<button onclick="openPage('dashboard')">Home</button>
<button onclick="openPage('billing')">Bill</button>
<button onclick="openPage('inventory')">Stock</button>
<button onclick="openPage('settings')">Settings</button>

</div>


<script>

/* PAGE */

function openPage(p){

["dashboard","billing","inventory","customers","history","settings"].forEach(id=>{
document.getElementById(id).classList.add("hidden")
})

document.getElementById(p).classList.remove("hidden")

}

/* BILL ITEMS */

function addRow(){

let r=document.querySelector("#items tr").cloneNode(true)

r.querySelectorAll("input").forEach(i=>i.value="")

r.querySelector(".total").innerText="0"

items.appendChild(r)

}

/* CALCULATION */

document.addEventListener("input",()=>{

let rows=document.querySelectorAll("#items tr")

let grand=0

rows.forEach(r=>{

let q=r.querySelector(".qty").value
let rate=r.querySelector(".rate").value
let gst=r.querySelector(".gst").value

let total=q*rate

total+=total*gst/100

r.querySelector(".total").innerText=total.toFixed(2)

grand+=total

})

grandTotal.innerText=grand.toFixed(2)

})

/* SAVE BILL */

function saveBill(){

let bills=JSON.parse(localStorage.getItem("bills")||"[]")

bills.push({

invoice:invoiceNo.value,
customer:customerName.value,
total:grandTotal.innerText

})

localStorage.setItem("bills",JSON.stringify(bills))

loadInvoices()

}

/* WHATSAPP */

function shareWhatsApp(){

let text=`Invoice ${invoiceNo.value} Total ₹${grandTotal.innerText}`

window.open(`https://wa.me/?text=${encodeURIComponent(text)}`)

}

/* STOCK */

function addStock(){

let stock=JSON.parse(localStorage.getItem("stock")||"[]")

stock.push({

name:itemName.value,
price:itemPrice.value

})

localStorage.setItem("stock",JSON.stringify(stock))

loadStock()

}

function loadStock(){

let stock=JSON.parse(localStorage.getItem("stock")||"[]")

stockTable.innerHTML=""

stock.forEach(s=>{

stockTable.innerHTML+=`
<tr>
<td>${s.name}</td>
<td>${s.price}</td>
</tr>
`

})

}

loadStock()

/* INVOICE HISTORY */

function loadInvoices(){

let data=JSON.parse(localStorage.getItem("bills")||"[]")

invoiceTable.innerHTML=""

data.forEach(b=>{

invoiceTable.innerHTML+=`
<tr>
<td>${b.invoice}</td>
<td>${b.customer}</td>
<td>${b.total}</td>
</tr>
`

})

}

loadInvoices()

/* PROFILE */

function saveProfile(){

let p={
name:shopName.value,
phone:shopPhone.value,
address:shopAddress.value
}

localStorage.setItem("profile",JSON.stringify(p))

shopTitle.innerText=p.name

}

function loadProfile(){

let p=JSON.parse(localStorage.getItem("profile")||"{}")

if(p.name){

shopTitle.innerText=p.name
shopName.value=p.name
shopPhone.value=p.phone
shopAddress.value=p.address

}

}

loadProfile()

/* BACKUP */

function backupData(){

let data=JSON.stringify(localStorage)

let blob=new Blob([data])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="mdbill-backup.json"

a.click()

}

/* RESTORE */

function restoreData(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

for(let key in data){

localStorage.setItem(key,data[key])

}

location.reload()

}

reader.readAsText(file)

}

/* AUTO INVOICE */

let inv=localStorage.getItem("inv")||1

invoiceNo.value="INV-"+inv

localStorage.setItem("inv",Number(inv)+1)

/* CHART */

new Chart(document.getElementById("salesChart"),{

type:"bar",

data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat"],
datasets:[{
label:"Sales",
data:[1200,1500,1800,2100,1700,2500]
}]
}

})

</script>

</body>
</html>
