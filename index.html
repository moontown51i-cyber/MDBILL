<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Billing Software</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

.container{
background:white;
padding:20px;
max-width:700px;
margin:auto;
border-radius:10px;
}

input,select{
padding:8px;
margin:5px;
width:100%;
}

button{
padding:10px;
background:#2c7be5;
color:white;
border:none;
margin-top:10px;
cursor:pointer;
}

.invoice{
margin-top:20px;
padding:15px;
border:1px solid #ddd;
}

</style>
</head>

<body>

<div class="container">

<h2>Billing Software</h2>

<label>Product Name</label>
<input id="product">

<label>Price</label>
<input type="number" id="price">

<label>Quantity</label>
<input type="number" id="qty">

<label>GST %</label>
<input type="number" id="gst">

<label>Invoice Type</label>
<select id="type">
<option value="gst">GST Bill</option>
<option value="non">Non GST Bill</option>
</select>

<button onclick="createBill()">Generate Bill</button>

<div class="invoice" id="invoice"></div>

</div>

<script>

let invoiceNumber = 1;

function createBill(){

let product = document.getElementById("product").value;
let price = parseFloat(document.getElementById("price").value);
let qty = parseInt(document.getElementById("qty").value);
let gst = parseFloat(document.getElementById("gst").value);
let type = document.getElementById("type").value;

let subtotal = price * qty;

let cgst = 0;
let sgst = 0;
let total = subtotal;

if(type === "gst"){

let gstAmount = subtotal * gst / 100;

cgst = gstAmount/2;
sgst = gstAmount/2;

total = subtotal + gstAmount;

}

document.getElementById("invoice").innerHTML = `

<h3>Invoice No: ${invoiceNumber}</h3>

<p>Product: ${product}</p>
<p>Price: ₹${price}</p>
<p>Quantity: ${qty}</p>

<p>Subtotal: ₹${subtotal}</p>

<p>CGST: ₹${cgst.toFixed(2)}</p>
<p>SGST: ₹${sgst.toFixed(2)}</p>

<h2>Total: ₹${total.toFixed(2)}</h2>

`;

invoiceNumber++;

}

</script>

</body>
</html>
