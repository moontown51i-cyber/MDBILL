<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>GST Quotation</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

#invoice{
width:210mm;
min-height:297mm;
margin:auto;
background:white;
padding:25px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #999;
padding:6px;
}

thead{
background:#f0f0f0;
}

.totalbox{
background:#efe6c8;
}

</style>

</head>

<body>

<div id="invoice">

<!-- HEADER -->

<div class="flex justify-between mb-6">

<div>

<h1 class="text-2xl font-bold">I COMPUTER</h1>

<p>
HANUMAN NAGAR 24B 1 ST FLOOR<br>
Nagpur Maharashtra 440024<br>
GSTIN : 27CAFPS2851G1ZJ
</p>

</div>

<div class="text-right">

<h2 class="text-3xl font-light">Quotation</h2>

<p>
Quotation No : <span id="qno">001</span><br>
Date : <span id="date"></span>
</p>

</div>

</div>

<!-- CUSTOMER -->

<div class="mb-4">

<b>Quotation For :</b><br>

<input id="customer" placeholder="Customer Name"
class="border p-1 w-1/2">

</div>

<!-- ADD ITEM -->

<div class="mb-4">

<input id="item" placeholder="Item Name" class="border p-1">
<input id="rate" placeholder="Rate" type="number" class="border p-1">
<input id="qty" placeholder="Qty" type="number" class="border p-1">

<button onclick="addItem()" class="bg-blue-600 text-white px-3 py-1">
Add
</button>

</div>

<!-- TABLE -->

<table>

<thead>

<tr>

<th>Sr</th>
<th>Name of Product</th>
<th>QTY</th>
<th>Rate</th>
<th>Taxable</th>
<th>CGST</th>
<th>SGST</th>
<th>Total</th>

</tr>

</thead>

<tbody id="items"></tbody>

</table>

<!-- TOTALS -->

<div class="flex justify-end mt-4">

<table class="w-64">

<tr class="totalbox">
<td>Taxable Amount</td>
<td id="taxable">0</td>
</tr>

<tr>
<td>CGST</td>
<td id="cgst">0</td>
</tr>

<tr>
<td>SGST</td>
<td id="sgst">0</td>
</tr>

<tr class="totalbox font-bold">
<td>Total</td>
<td id="grand">0</td>
</tr>

</table>

</div>

<div class="mt-10 text-right">
Authorized Signature
</div>

</div>

<div class="text-center mt-4">

<button onclick="downloadPDF()" class="bg-red-600 text-white px-6 py-2">
Download PDF
</button>

</div>

<script>

document.getElementById("date").innerText=
new Date().toLocaleDateString();

let items=[];

function addItem(){

const name=document.getElementById("item").value;
const rate=parseFloat(document.getElementById("rate").value);
const qty=parseFloat(document.getElementById("qty").value);

const taxable=rate*qty;
const gst=taxable*0.18;

items.push({

name,
rate,
qty,
taxable,
cgst:gst/2,
sgst:gst/2,
total:taxable+gst

});

render();

}

function render(){

let html="";
let taxable=0;
let cgst=0;
let sgst=0;
let grand=0;

items.forEach((it,i)=>{

html+=`

<tr>

<td>${i+1}</td>
<td>${it.name}</td>
<td>${it.qty}</td>
<td>${it.rate}</td>
<td>${it.taxable}</td>
<td>${it.cgst}</td>
<td>${it.sgst}</td>
<td>${it.total}</td>

</tr>

`;

taxable+=it.taxable;
cgst+=it.cgst;
sgst+=it.sgst;
grand+=it.total;

});

document.getElementById("items").innerHTML=html;

document.getElementById("taxable").innerText=taxable;
document.getElementById("cgst").innerText=cgst;
document.getElementById("sgst").innerText=sgst;
document.getElementById("grand").innerText=grand;

}

function downloadPDF(){

html2pdf()
.from(document.getElementById("invoice"))
.save("quotation.pdf");

}

</script>

</body>
</html>
