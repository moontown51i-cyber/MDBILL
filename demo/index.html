<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERP Pro v21 - Perfect Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; padding-bottom: 90px; }
        
        /* Navigation Style */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0; }
        .nav-btn { flex: 1; color: #94a3b8; text-align: center; padding: 15px 5px; font-size: 10px; font-weight: 800; text-transform: uppercase; border: none; background: transparent; }
        .nav-btn.active { color: #4f46e5; }
        .nav-btn.active b { background: #eef2ff; padding: 10px 18px; border-radius: 16px; display: inline-block; margin-bottom: 4px; }

        /* Invoice Centering Logic */
        .bill-outer-wrapper { 
            width: 100%; 
            display: flex; 
            justify-content: center; /* Horizontally Center */
            align-items: flex-start; 
            overflow: hidden; 
            padding: 10px 0;
        }
        #invoice-page { 
            background: white; 
            width: 210mm; /* A4 Width */
            min-height: 297mm; 
            padding: 12mm; 
            box-sizing: border-box; 
            transform-origin: top center; /* Scaling from center */
            box-shadow: 0 10px 50px rgba(0,0,0,0.1);
        }

        /* Mobile Scale Fix */
        @media (max-width: 800px) {
            #invoice-page { 
                transform: scale(0.40); 
                margin-bottom: -550px; 
            }
        }

        .table-bill { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table-bill th, .table-bill td { border: 1px solid #000; padding: 6px; font-size: 11px; text-align: center; }
        .theme-modern th { background: #4f46e5; color: white; border-color: #4f46e5; }

        @media print { .no-print { display: none !important; } #invoice-page { transform: scale(1) !important; margin: 0 !important; box-shadow: none; border: none; } }
        #lock-screen { position: fixed; inset: 0; background: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 style="font-size: 80px;">🔒</h1>
        <h2 class="text-2xl font-black text-rose-600 mb-2">Service Expired</h2>
        <p class="text-slate-500 mb-8">Kripya software ko renew karwayein.</p>
        <a id="wa-link" href="#" class="bg-emerald-600 text-white px-8 py-4 rounded-full font-bold">Contact Support</a>
    </div>

    <div id="main-app">
        <div class="bottom-nav no-print">
            <button onclick="tab('entry')" id="btn-entry" class="nav-btn active"><b>📝</b><br>Entry</button>
            <button onclick="tab('view')" id="btn-view" class="nav-btn"><b>📄</b><br>Bill</button>
            <button onclick="tab('reports')" id="btn-reports" class="nav-btn"><b>📊</b><br>History</button>
            <button onclick="tab('settings')" id="btn-settings" class="nav-btn"><b>⚙️</b><br>Setup</button>
        </div>

        <div class="p-4 max-w-xl mx-auto">
            <!-- SECTION 1: ENTRY -->
            <section id="sec-entry" class="space-y-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border-b-4 border-indigo-500 space-y-3">
                    <select id="b_type" onchange="sync()" class="w-full bg-slate-50 p-4 rounded-2xl font-bold text-indigo-700 outline-none border-none shadow-inner">
                        <option value="TAX INVOICE">TAX INVOICE</option>
                        <option value="SALE BILL">SALE BILL</option>
                        <option value="QUOTATION">QUOTATION</option>
                    </select>
                    <input id="c_name" type="text" placeholder="Grahak ka Naam" oninput="sync()" class="w-full bg-slate-50 p-4 rounded-2xl outline-none">
                    <input id="c_addr" type="text" placeholder="Grahak ka Pata (Address)" oninput="sync()" class="w-full bg-slate-50 p-4 rounded-2xl outline-none">
                    <input id="c_gst" type="text" placeholder="Customer GSTIN" oninput="sync()" class="w-full bg-slate-50 p-4 rounded-2xl uppercase">
                    <input id="c_phone" type="number" placeholder="WhatsApp No" class="w-full bg-slate-50 p-4 rounded-2xl outline-none">
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border-b-4 border-emerald-500 space-y-3">
                    <input id="i_name" type="text" placeholder="Item Name" class="w-full bg-slate-50 p-4 rounded-2xl outline-none">
                    <div class="grid grid-cols-2 gap-3">
                        <input id="i_rate" type="number" placeholder="Rate" class="bg-slate-50 p-4 rounded-2xl outline-none">
                        <input id="i_qty" type="number" placeholder="Qty" class="bg-slate-50 p-4 rounded-2xl outline-none">
                    </div>
                    <select id="i_slab" class="w-full bg-slate-50 p-4 rounded-2xl font-bold shadow-inner border-none outline-none">
                        <option value="18">18% GST</option><option value="12">12% GST</option><option value="5">5% GST</option><option value="28">28% GST</option><option value="0">0% GST</option>
                    </select>
                    <button onclick="addItem()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">+ Add Item</button>
                </div>
                <div id="mini-list" class="hidden bg-white p-3 rounded-2xl border flex flex-wrap gap-2"></div>
                <button onclick="tab('view')" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold uppercase tracking-widest shadow-2xl">👁️ Preview Bill</button>
            </section>

            <!-- SECTION 2: VIEW BILL -->
            <section id="sec-view" class="hidden">
                <div class="no-print flex justify-center gap-3 mb-4">
                    <button onclick="downloadPDF()" class="bg-rose-600 text-white px-8 py-3 rounded-full font-bold text-[10px]">PDF</button>
                    <button onclick="shareWA()" class="bg-emerald-600 text-white px-8 py-3 rounded-full font-bold text-[10px]">WA</button>
                    <button onclick="saveBill()" class="bg-indigo-700 text-white px-8 py-3 rounded-full font-bold text-[10px]">SAVE</button>
                </div>
                <div class="bill-outer-wrapper">
                    <div id="invoice-page" class="theme-modern">
                        <div class="flex justify-between items-start mb-8 border-b-2 border-indigo-600 pb-4">
                            <div class="w-2/3">
                                <h1 id="out_s_name" class="text-3xl font-black uppercase text-indigo-900 leading-none">SHOP NAME</h1>
                                <p id="out_s_addr" class="text-[10px] mt-1 font-semibold text-slate-500">Address...</p>
                                <p id="out_s_gst_box" class="text-[12px] font-bold mt-2 uppercase text-indigo-600">GSTIN : <span id="out_s_gst">-</span></p>
                            </div>
                            <div class="text-right">
                                <h1 id="out_title" class="text-2xl font-black uppercase italic text-indigo-200">INVOICE</h1>
                                <p class="text-[11px] font-bold mt-2">DATE: <span id="out_date"></span></p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-6 text-[10px] border-b pb-4 bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <div>
                                <p class="font-bold underline text-slate-400 mb-1 uppercase">Bill To:</p>
                                <p id="out_c_name" class="font-black text-xs uppercase text-slate-800">CASH CUSTOMER</p>
                                <p id="out_c_addr" class="text-slate-500 leading-tight">Customer Address Details...</p>
                                <p id="out_c_gst_box" class="font-bold uppercase mt-1 text-indigo-700">GST: <span id="out_c_gst">-</span></p>
                            </div>
                            <div class="text-right font-bold">
                                <p>INV NO: <span id="out_no" class="text-indigo-600">#1001</span></p>
                            </div>
                        </div>
                        <table class="table-bill"><thead id="table-head"></thead><tbody id="billBody"></tbody></table>
                        <div class="flex justify-between mt-8 border-t-2 border-indigo-600 pt-4 font-bold">
                            <div class="w-1/2 text-[9px] text-slate-400 italic">
                                <p class="font-bold underline text-black not-italic uppercase">Terms:</p>
                                <p id="out_terms">1. Goods sold not returned.</p>
                            </div>
                            <div class="w-[210px] border-2 border-indigo-600 p-2 rounded-xl bg-slate-50 text-[10px]">
                                <div id="summary-taxable" class="flex justify-between border-b pb-1"><span>Taxable Value</span><span id="sum_taxable">0.00</span></div>
                                <div id="summary-gst" class="flex justify-between pt-1"><span>GST Amount</span><span id="sum_tax">0.00</span></div>
                                <div class="flex justify-between p-2 bg-indigo-900 text-white text-base font-black italic rounded-lg mt-2 uppercase shadow-md"><span>Total</span><span id="sum_grand">₹ 0.00</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- SECTION 3: REPORTS -->
            <section id="sec-reports" class="hidden space-y-3">
                <h2 class="font-black text-center text-indigo-900 uppercase">Sales History</h2>
                <div id="history-list" class="space-y-2"></div>
            </section>

            <!-- SECTION 4: SETUP -->
            <section id="sec-settings" class="hidden bg-white p-8 rounded-[2.5rem] shadow-2xl space-y-4">
                <input id="set_name" type="text" placeholder="Shop Name" class="w-full bg-slate-50 p-4 rounded-2xl font-bold">
                <input id="set_addr" type="text" placeholder="Address" class="w-full bg-slate-50 p-4 rounded-2xl">
                <input id="set_gst" type="text" placeholder="GSTIN" class="w-full bg-slate-50 p-4 rounded-2xl uppercase">
                <textarea id="set_terms" class="w-full bg-slate-50 p-4 rounded-2xl text-[10px]" rows="3"></textarea>
                <button onclick="saveSetup()" class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black uppercase">Update Shop Profile</button>
            </section>
        </div>
    </div>

    <script>
        const EXPIRY_DATE = "2026-03-16"; // Set Date
        const MY_PHONE = "919022609138"; // Set Phone

        let items = [];
        let db = JSON.parse(localStorage.getItem('erp_v21_db')) || [];

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            if (today > EXPIRY_DATE) {
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('lock-screen').style.display = 'flex';
                document.getElementById('wa-link').href = `https://wa.me/${MY_PHONE}`;
            }
            document.getElementById('set_name').value = localStorage.getItem('sn') || 'I COMPUTER';
            document.getElementById('set_addr').value = localStorage.getItem('sa') || 'NAGPUR';
            document.getElementById('set_gst').value = localStorage.getItem('sg') || '27XXXXX';
            document.getElementById('set_terms').value = localStorage.getItem('st') || '1. Subject to Nagpur jurisdiction.';
            document.getElementById('out_date').innerText = new Date().toLocaleDateString('en-GB');
            sync();
        };

        function tab(id) {
            ['entry','view','reports','settings'].forEach(s => {
                document.getElementById('sec-'+s).classList.add('hidden');
                document.getElementById('btn-'+s).classList.remove('active');
            });
            document.getElementById('sec-'+id).classList.remove('hidden');
            document.getElementById('btn-'+id).classList.add('active');
            if(id === 'view') renderTable();
            if(id === 'reports') renderHistory();
        }

        function addItem() {
            const n = document.getElementById('i_name').value, r = parseFloat(document.getElementById('i_rate').value), q = parseFloat(document.getElementById('i_qty').value), s = parseInt(document.getElementById('i_slab').value);
            if(!n || isNaN(r)) return alert("Data bhariye!");
            const taxable = r * q;
            items.push({ name: n, rate: r, qty: q, slab: s, taxable, tax: taxable * (s/100), total: taxable * (1 + s/100) });
            renderMiniTags();
            document.getElementById('i_name').value='';document.getElementById('i_rate').value='';document.getElementById('i_qty').value='';
        }

        function renderMiniTags() {
            const div = document.getElementById('mini-list');
            div.classList.toggle('hidden', items.length === 0);
            div.innerHTML = items.map((it, i) => `<span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-[9px] font-bold border border-indigo-100">${it.name} <button onclick="delItem(${i})" class="ml-1 text-rose-500">×</button></span>`).join('');
        }

        function delItem(i) { items.splice(i, 1); renderMiniTags(); }

        function renderTable() {
            const head = document.getElementById('table-head');
            head.innerHTML = `<tr><th rowspan="2">Sr.</th><th rowspan="2" class="text-left px-2 w-1/2">Description</th><th rowspan="2">Qty</th><th rowspan="2">Rate</th><th rowspan="2">Taxable</th><th colspan="2">CGST</th><th colspan="2">SGST</th><th rowspan="2">Total</th></tr><tr class="text-[8px] uppercase"><th>Rate</th><th>Amt</th><th>Rate</th><th>Amt</th></tr>`;
            let h = '', st = 0, tx = 0, gt = 0;
            items.forEach((it, i) => {
                h += `<tr><td>${i+1}</td><td class="text-left px-2 font-bold uppercase">${it.name}</td><td>${it.qty}</td><td>${it.rate.toFixed(2)}</td><td>${it.taxable.toFixed(2)}</td><td>${it.slab/2}%</td><td>${(it.tax/2).toFixed(2)}</td><td>${it.slab/2}%</td><td>${(it.tax/2).toFixed(2)}</td><td class="font-black">₹${it.total.toFixed(2)}</td></tr>`;
                st += it.taxable; tx += it.tax; gt += it.total;
            });
            document.getElementById('billBody').innerHTML = h;
            document.getElementById('sum_taxable').innerText = st.toFixed(2);
            document.getElementById('sum_tax').innerText = tx.toFixed(2);
            document.getElementById('sum_grand').innerText = "₹ " + gt.toFixed(2);
            document.getElementById('out_no').innerText = "#" + (1000 + db.length);
            sync();
        }

        function sync() {
            document.getElementById('out_s_name').innerText = document.getElementById('set_name').value;
            document.getElementById('out_s_addr').innerText = document.getElementById('set_addr').value;
            document.getElementById('out_s_gst').innerText = document.getElementById('set_gst').value;
            document.getElementById('out_title').innerText = document.getElementById('b_type').value;
            document.getElementById('out_c_name').innerText = document.getElementById('c_name').value || 'CASH CUSTOMER';
            document.getElementById('out_c_addr').innerText = document.getElementById('c_addr').value || 'NA';
            document.getElementById('out_ship_name').innerText = document.getElementById('c_name').value || 'CASH CUSTOMER';
            document.getElementById('out_c_gst').innerText = document.getElementById('c_gst').value || 'UNREGISTERED';
            document.getElementById('out_terms').innerText = document.getElementById('set_terms').value;
            document.getElementById('footer_shop').innerText = document.getElementById('set_name').value;
        }

        function saveBill() {
            if(items.length === 0) return alert("Empty!");
            db.push({ cust: document.getElementById('c_name').value || 'Cash', total: document.getElementById('sum_grand').innerText, date: new Date().toLocaleDateString() });
            localStorage.setItem('erp_v21_db', JSON.stringify(db));
            alert("Bill Saved!");
        }

        function saveSetup() {
            localStorage.setItem('sn', document.getElementById('set_name').value);
            localStorage.setItem('sa', document.getElementById('set_addr').value);
            localStorage.setItem('sg', document.getElementById('set_gst').value);
            localStorage.setItem('st', document.getElementById('set_terms').value);
            alert("Settings Saved!");
            tab('entry');
        }

        function downloadPDF() { html2pdf().from(document.getElementById('invoice-page')).save(); }
        function shareWA() { window.open(`https://wa.me/91${document.getElementById('c_phone').value}?text=Amount: ${document.getElementById('sum_grand').innerText}`, '_blank'); }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = db.slice().reverse().map(inv => `
                <div class="p-4 bg-white rounded-3xl shadow flex justify-between text-xs font-bold border-l-8 border-indigo-600">
                    <span>${inv.date} | ${inv.cust}</span>
                    <span class="text-indigo-800">${inv.total}</span>
                </div>
            `).join('') || '<p class="text-center p-10 italic">No Sales Record</p>';
        }
    </script>
</body>
</html>
